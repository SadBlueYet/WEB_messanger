<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h1 class="login-header">Добро пожаловать!</h1>
        <p class="login-subheader">Войдите, чтобы продолжить</p>
        <form class="login-form">
            <label for="phone">Номер телефона</label>
            <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" required>

            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль" required>

            <button type="submit" class="btn-login">Войти</button>
        </form>
        <p class="login-footer">
            Нет аккаунта? <a href="registry.html">Зарегистрируйтесь</a>
        </p>

    </div>
</body>
</html>
