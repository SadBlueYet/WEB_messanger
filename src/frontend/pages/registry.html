<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h1 class="login-header">Регистрация</h1>
        <p class="login-subheader">Создайте новый аккаунт</p>

        <form class="login-form" action="/register" method="POST">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" placeholder="Введите имя пользователя" required>

            <label for="phone">Номер телефона</label>
            <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" required>

            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Введите пароль" required>

            <label for="confirm-password">Подтвердите пароль</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Подтвердите пароль" required>


            <button type="submit" class="btn-login">Зарегистрироваться</button>
        </form>

        <div class="login-footer">
            <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
        </div>
    </div>
</body>
</html>
