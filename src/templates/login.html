{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <h1 class="login-header">Добро пожаловать!</h1>
    <p class="login-subheader">Войдите, чтобы продолжить</p>
    <form class="login-form" action="/api/v1/auth/login" method="POST">
        <label for="email">Электронная почта</label>
        <input type="email" id="email" name="email" placeholder="Введите почту" required>

        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Введите пароль" required>
        <label class="container">Запомнить меня
          <input type="checkbox" checked="checked" name="remember_me">
          <span class="checkmark"></span>
        </label>

        <button type="submit" class="btn-login">Войти</button>

    </form>
    <p class="login-footer">
        Нет аккаунта? <a href="#" onclick="sendRequest();">Зарегистрируйтесь</a>
    </p>


</div>
{% endblock %}

{% block script %}
<script>
    function sendRequest() {
        fetch('/registry', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
            }
        })
        .then(response => {
            if (response.ok) {
                window.location.href = '/registry';
            } else {
                alert('Ошибка при отправке запроса');
            }
        })
        .catch(error => {
            console.error('Ошибка:', error);
        });
    }
</script>
{% endblock %}
